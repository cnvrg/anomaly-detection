title: anomaly autoencoder
version: 1.0.0
description: "autoencoder"
icon: python

author: "cnvrg"
author_email: "libhub@cnvrg.io"

tags:
  - training
command: python3 model.py

requirements:
  cpu: 3.5
  memory: 8
  gpu: 0
  hpu: 0

image: cnvrg:v5.0
language: python3

arguments:
  - key: 'data_dir'
    type: 'categorical'
    values:
      - '/input/preprocess/data_df_pca.csv'
  - key: 'hidden_neurons'
    type: 'categorical'
    values:
      - 'default,3,5'
  - key: 'epochs'
    type: 'discrete'
    values:
      - '100,200,300'
  - key: 'dropout_rate'
    type: 'discrete'
    values:
      - '0.2,0.4'
  - key: 'l2_regularizer'
    type: 'discrete'
    values:
      - '0.1,0.3'