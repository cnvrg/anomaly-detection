---
title: Anomaly deploy standalone # Required on creation, replaces the "flow" parameter
version: 1.0.0 # Required
description: "Training for anomaly detection" # Optional for showing summary on UI
long_description: "Training for anomaly detection and deploy it."
# Optional properties for crediting authors
author: "cnvrg"
author_email: "libhub@cnvrg.io"

# At least one tag [inference, training, data] must be present
tags:
  - inference

# List of tasks (libraries)
tasks:

  - title: Inference
    top: 400
    left: 900

    # Type must be according to the flow task conventions (data, exec, deploy)
    type: deploy

    # The library data
    library: anomaly-inference-standalone
    library_version: 1.0.0

    # The flattened library parameters (in this case we have inference library)
    command: python3 predict.py
    kind: webservice

    requirements:
      cpu: 3.5
      memory: 8
      gpu: 0
      hpu: 0
    
    image: cnvrg/cnvrg:v5.0
    language: python3
    accept_files: false

    file_name: predict.py # the entrypoint file name
    function_name: predict # the entrypoint function
    prep_file: '' # preprocess file name
    prep_function: '' # preprocess function
    input_example:
      vars: "7590-VHVEG,Female,0,Yes,No,1,No,No phone service,DSL,No,Yes,No,No,No,No,Month-to-month,Yes,Electronic check,29.85,29.85"
    input_schema:
      vars: text
    output_schema:
      prediction: text


relations: []
