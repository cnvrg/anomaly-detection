title: anomaly xgbod
version: 1.0.0
description: "xgbod"
icon: python

author: "cnvrg"
author_email: "libhub@cnvrg.io"

tags:
  - training
command: python3 model.py

requirements:
  cpu: 3.5
  memory: 8
  gpu: 0
  hpu: 0

image: python:3.8.6
language: python3

arguments:
  - key: 'data_dir'
    type: 'categorical'
    values:
      - '/input/preprocess/data_df_pca.csv'
  - key: 'n_estimators'
    type: 'categorical'
    values:
      - '100'
  - key: 'max_depth'
    type: 'categorical'
    values:
      - '3'
  - key: 'learning_rate'
    type: 'categorical'
    values:
      - '0.1'