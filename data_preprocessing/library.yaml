title: anomaly data preprocessing
version: 1.0.0
description: "data preprocessing is a lib used to process data"
icon: python

author: "cnvrg"
author_email: "libhub@cnvrg.io"

tags:
  - training
command: python3 data_preprocessing.py

requirements:
  cpu: 3.5
  memory: 8
  gpu: 0
  hpu: 0

image: python:3.8.6
language: python3

arguments:
  - key: 'anomaly_data'
    type: 'categorical'
    values:
      - '/data/anomalydata/creditcard.csv'
  - key: 'label_encoding'
    type: 'categorical'
    values:
      - ''
  - key: 'scaler'
    type: 'categorical'
    values:
      - ''
  - key: 'id_column'
    type: 'discrete'
    values:
      - ''
  - key: 'pca_arg'
    type: 'discrete'
    values:
      - '0.95'
  - key: 'pca_overwrite'
    type: 'discrete'
    values:
      - 'No'



